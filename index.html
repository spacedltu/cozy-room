<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop This Look</title>
  <meta name="description" content="Shop cozy neutral home decor pieces from this Pinterest room." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <section class="hero">
      <img id="heroImage" src="" alt="Shop this room" />
      <div class="heroOverlay">
        <p class="eyebrow">Pinterest room finds</p>
        <h1 id="pageTitle">Shop This Look</h1>
        <p id="pageSubtitle">Everything from this Pinterest room is linked below.</p>
      </div>
    </section>

    <section class="intro">
      <p>Tap any item to shop the look.</p>
    </section>

    <section class="productGrid" id="productGrid"></section>

    <footer>
      <p id="disclosure"></p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
